<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <link rel="icon" type="image/x-icon" href="{{ "favicon.ico" | relURL }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ "apple-touch-icon.png" | relURL }}">
    <script>
      // Match the home page's pre-paint theme bootstrap.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
</head>
<body>
    <div class="single-container">
        <div class="single-header">
            <a href="{{ "/" | relURL }}" class="back-link">← home</a>
            <a href="{{ "/" | relURL }}#annotation-{{ .File.BaseFileName }}" class="back-link">open on poster →</a>
        </div>

        <div class="single-content">
            <div class="title-block">
                <span class="marker-number" aria-hidden="true">{{ .Params.number }}</span>
                <div>
                    <h1>{{ .Title }}</h1>
                    <div class="description">{{ .Params.description }}</div>
                </div>
            </div>

            <div class="single-body">
                {{ .Content }}
            </div>
        </div>

        <div class="single-footer">-- EOF --</div>
    </div>
</body>
</html>
